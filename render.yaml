services:
  - type: web
    name: linebot-english-learning
    runtime: docker
    plan: free
    autoDeployTrigger: commit
    dockerfilePath: ./Dockerfile
    envVars:
      - key: AI_PROVIDER
        value: gemini
      - key: DEV_ASSISTANT
        value: gpt
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: VOCABULARY_SYNC_ON_STARTUP
        value: true
      - key: SESSION_TTL_SECONDS
        value: 3600
      - key: LINE_SIGNATURE_VALIDATION_ENABLED
        value: true
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
